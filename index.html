<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BTVN</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #050505;
  color: #f2f2f2;
  line-height: 1.7;
  overflow-x: hidden;
}

/* nền */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle at 18% 0%, rgba(255,255,255,.08), transparent 30%),
    radial-gradient(circle at 90% 5%, rgba(255,255,255,.04), transparent 35%),
    linear-gradient(180deg, #070707, #020202);
}

/* layout */
.layout {
  display: flex;
  min-height: 100vh;
}

/* sidebar desktop */
.sidebar {
  width: 280px;
  min-width: 280px;
  height: 100vh;
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 24px;
  background: rgba(5,5,5,.82);
  border-right: 1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(18px);
  overflow-y: auto;
}

.logo {
  margin-bottom: 22px;
}

.logo h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: .8px;
  color: #fff;
}

.logo p {
  margin: 6px 0 0;
  color: #8a8a8a;
  font-size: 13px;
}

.nav-title {
  margin: 22px 0 10px;
  color: #666;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.nav button {
  flex: 0 0 auto;
  width: 100%;
  padding: 12px 14px;
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 15px;
  background: rgba(18,18,18,.8);
  color: #ddd;
  font-size: 15px;
  text-align: left;
  cursor: pointer;
  transition: .2s ease;
}

.nav button:hover {
  background: rgba(35,35,35,.92);
  border-color: rgba(255,255,255,.2);
  transform: translateX(4px);
}

.nav button.active {
  background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.05));
  border-color: rgba(255,255,255,.32);
  color: #fff;
}

/* content */
.content {
  flex: 1;
  width: calc(100% - 280px);
  padding: clamp(16px, 4vw, 48px);
  display: flex;
  justify-content: center;
}

.card {
  width: min(100%, 1040px);
  min-height: calc(100vh - 96px);
  padding: clamp(20px, 4vw, 44px);
  background: rgba(12,12,12,.78);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 28px;
  box-shadow: 0 30px 100px rgba(0,0,0,.6);
  backdrop-filter: blur(20px);
}

.loading {
  min-height: 220px;
  display: grid;
  place-items: center;
  color: #999;
}

/* markdown */
.card h1 {
  margin: 0 0 24px;
  font-size: clamp(34px, 6vw, 54px);
  line-height: 1.08;
  letter-spacing: -.8px;
  color: #fff;
}

.card h2 {
  margin-top: 40px;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: clamp(24px, 4vw, 34px);
  color: #f5f5f5;
}

.card h3 {
  margin-top: 28px;
  font-size: clamp(20px, 3vw, 26px);
  color: #eee;
}

.card p,
.card li {
  font-size: clamp(16px, 2.2vw, 18px);
  color: #d8d8d8;
}

.card strong {
  color: #fff;
}

.card a {
  color: #fff;
  text-decoration: none;
  border-bottom: 1px dashed rgba(255,255,255,.35);
}

.card blockquote {
  margin: 22px 0;
  padding: 14px 18px;
  border-left: 4px solid rgba(255,255,255,.35);
  background: rgba(255,255,255,.045);
  border-radius: 14px;
  color: #d0d0d0;
}

/* table */
.table-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 22px 0;
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 18px;
  background: rgba(0,0,0,.25);
}

table {
  width: 100%;
  min-width: 720px;
  border-collapse: collapse;
}

th,
td {
  min-width: 180px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  border-right: 1px solid rgba(255,255,255,.06);
  vertical-align: top;
}

th {
  background: rgba(255,255,255,.075);
  color: #fff;
  font-weight: 750;
}

td {
  background: rgba(10,10,10,.45);
  color: #e8e8e8;
}

tr:hover td {
  background: rgba(255,255,255,.045);
}

/* code */
pre {
  max-width: 100%;
  overflow-x: auto;
  padding: 18px;
  border-radius: 18px;
  background: #050505;
  border: 1px solid rgba(255,255,255,.09);
}

pre code {
  background: transparent;
  padding: 0;
}

code {
  background: rgba(255,255,255,.08);
  color: #fff;
  padding: 3px 7px;
  border-radius: 7px;
}

img {
  max-width: 100%;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.08);
}

/* scrollbar */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: #050505;
}

::-webkit-scrollbar-thumb {
  background: #2b2b2b;
  border-radius: 999px;
}

/* mobile */
@media (max-width: 820px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    min-width: 0;
    height: auto;
    max-height: 112px;
    position: sticky;
    top: 0;
    padding: 12px 14px;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,.08);
    overflow: hidden;
  }

  .logo {
    margin-bottom: 10px;
  }

  .logo h1 {
    font-size: 24px;
  }

  .logo p {
    display: none;
  }

  .nav-title {
    display: none;
  }

  .nav {
    flex-direction: row;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 7px;
    scroll-snap-type: x mandatory;
  }

  .nav button {
    width: auto;
    min-width: max-content;
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 14px;
    white-space: nowrap;
    scroll-snap-align: start;
  }

  .nav button:hover {
    transform: none;
  }

  .content {
    width: 100%;
    padding: 10px;
  }

  .card {
    width: 100%;
    min-height: auto;
    padding: 18px;
    border-radius: 20px;
  }

  .card h1 {
    font-size: 34px;
  }

  table {
    min-width: 720px;
  }
}

/* iPhone nhỏ */
@media (max-width: 430px) {
  body {
    line-height: 1.62;
  }

  .sidebar {
    max-height: 108px;
  }

  .card {
    padding: 16px;
    border-radius: 18px;
  }

  .card h1 {
    font-size: 32px;
  }

  .card p,
  .card li {
    font-size: 15.5px;
  }

  th,
  td {
    min-width: 170px;
    padding: 12px;
  }

  table {
    min-width: 680px;
  }
}
</style>
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">
      <h1>BTVN</h1>
      <p>Kho bài tập Markdown</p>
    </div>

    <div class="nav-title">Danh sách</div>

    <nav class="nav">
      <button data-file="index.md" onclick="go('index.md')">🏠 Trang chủ</button>
      <button data-file="anh.md" onclick="go('anh.md')">🇬🇧 Tiếng Anh</button>
      <button data-file="toan.md" onclick="go('toan.md')">➗ Toán</button>
      <button data-file="van.md" onclick="go('van.md')">📖 Văn</button>
      <button data-file="sinh.md" onclick="go('sinh.md')">🧬 Sinh</button>
      <button data-file="ly.md" onclick="go('ly.md')">⚡ Lý</button>
      <button data-file="hoa.md" onclick="go('hoa.md')">🧪 Hóa</button>
    </nav>
  </aside>

  <main class="content">
    <article class="card" id="content">
      <div class="loading">Đang tải Markdown...</div>
    </article>
  </main>

</div>

<script>
marked.setOptions({
  breaks: true,
  gfm: true
});

function setActive(file) {
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.file === file);
  });
}

function fixBrokenTables() {
  document.querySelectorAll("#content table").forEach(table => {
    const rows = [...table.querySelectorAll("tr")];
    let maxCols = 0;

    rows.forEach(row => {
      maxCols = Math.max(maxCols, row.children.length);
    });

    rows.forEach(row => {
      while (row.children.length < maxCols) {
        const cell = document.createElement(row.parentElement.tagName.toLowerCase() === "thead" ? "th" : "td");
        cell.innerHTML = "";
        row.appendChild(cell);
      }
    });
  });
}

function wrapTables() {
  document.querySelectorAll("#content table").forEach(table => {
    if (!table.parentElement.classList.contains("table-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "table-wrap";
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    }
  });
}

function highlightCode() {
  document.querySelectorAll("pre code").forEach(block => {
    hljs.highlightElement(block);
  });
}

function loadMD(file) {
  const el = document.getElementById("content");
  setActive(file);

  el.innerHTML = "<div class='loading'>Đang tải Markdown...</div>";

  fetch(file)
    .then(res => {
      if (!res.ok) throw new Error();
      return res.text();
    })
    .then(md => {
      el.innerHTML = marked.parse(md);
      fixBrokenTables();
      wrapTables();
      highlightCode();
      window.scrollTo({ top: 0, behavior: "smooth" });
    })
    .catch(() => {
      el.innerHTML = `
        <h1>Không load được file</h1>
        <p>Chưa tìm thấy file: <code>${file}</code></p>
        <p>Hãy tạo file này trong repo GitHub rồi thử lại.</p>
      `;
    });
}

function go(file) {
  location.hash = file;
}

function router() {
  let file = decodeURIComponent(location.hash.replace("#", ""));
  if (!file) file = "index.md";
  loadMD(file);
}

window.addEventListener("hashchange", router);
router();
</script>

</body>
</html>
