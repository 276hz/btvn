<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BTVN</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#050505;
  color:#eee;
  line-height:1.65;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 0%,rgba(255,255,255,.08),transparent 30%),
    radial-gradient(circle at 90% 10%,rgba(255,255,255,.04),transparent 35%),
    linear-gradient(180deg,#080808,#020202);
}

.topbar{
  position:relative;
  z-index:20;
  padding:14px 14px 10px;
  background:rgba(5,5,5,.88);
  border-bottom:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
}
.top-inner{
  max-width:1280px;
  margin:0 auto;
}
.brand{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.brand h1{
  margin:0;
  font-size:30px;
  color:#fff;
}
.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
button{
  border:1px solid rgba(255,255,255,.12);
  background:rgba(20,20,20,.9);
  color:#eee;
  border-radius:999px;
  padding:9px 13px;
  cursor:pointer;
}
button:hover{background:#222}

.nav{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:12px 0 4px;
}
.nav button{
  flex:0 0 auto;
  white-space:nowrap;
}
.nav button.active{
  background:rgba(255,255,255,.16);
  border-color:rgba(255,255,255,.32);
  color:#fff;
}

.search{
  width:100%;
  margin-top:10px;
}
.search input{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.1);
  background:#0d0d0d;
  color:#fff;
  outline:none;
}

.layout{
  display:grid;
  grid-template-columns:260px minmax(0,1fr);
  gap:18px;
  max-width:1280px;
  margin:0 auto;
  padding:18px;
}

.toc{
  position:sticky;
  top:12px;
  align-self:start;
  max-height:calc(100vh - 24px);
  overflow:auto;
  padding:16px;
  background:rgba(12,12,12,.78);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
}
.toc h2{
  margin:0 0 12px;
  font-size:16px;
  color:#fff;
}
.toc a{
  display:block;
  padding:8px 0;
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.toc a:hover{color:#fff}

.card{
  min-width:0;
  padding:clamp(17px,3vw,40px);
  background:rgba(12,12,12,.78);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  box-shadow:0 30px 100px rgba(0,0,0,.6);
}

.loading{
  min-height:220px;
  display:grid;
  place-items:center;
  color:#888;
}

.card h1{
  margin:0 0 24px;
  font-size:clamp(32px,5vw,52px);
  line-height:1.1;
  color:#fff;
}
.card h2{
  margin-top:38px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,.08);
  font-size:clamp(23px,3.5vw,34px);
  color:#fff;
}
.card h3{
  margin-top:28px;
  font-size:clamp(19px,3vw,26px);
  color:#f1f1f1;
}
.card p,.card li{
  font-size:16px;
  color:#ddd;
}
.card a{
  color:#fff;
  text-decoration:none;
  border-bottom:1px dashed rgba(255,255,255,.35);
}
.card strong{color:#fff}

.table-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  margin:22px 0;
  border:1px solid rgba(255,255,255,.09);
  border-radius:16px;
  background:rgba(0,0,0,.25);
}
table{
  width:100%;
  min-width:720px;
  border-collapse:collapse;
}
th,td{
  padding:13px 15px;
  border-bottom:1px solid rgba(255,255,255,.08);
  vertical-align:top;
}
th{
  background:rgba(255,255,255,.08);
  color:#fff;
}
td{
  background:rgba(10,10,10,.45);
  color:#e8e8e8;
  word-break:break-word;
}
th:nth-child(1),td:nth-child(1){
  width:50%;
  font-weight:700;
}
th:nth-child(2),td:nth-child(2){width:50%}
tr:hover td{background:rgba(255,255,255,.045)}

pre{
  overflow:auto;
  padding:16px;
  border-radius:16px;
  background:#050505;
  border:1px solid rgba(255,255,255,.09);
}
code{
  background:rgba(255,255,255,.08);
  padding:3px 7px;
  border-radius:7px;
}
pre code{background:transparent;padding:0}

mark{
  background:#facc15;
  color:#000;
  border-radius:4px;
  padding:0 2px;
}

.float{
  position:fixed;
  right:14px;
  bottom:14px;
  display:flex;
  gap:8px;
  z-index:50;
}
.float button{
  background:rgba(20,20,20,.85);
  backdrop-filter:blur(14px);
}

body.focus .topbar,
body.focus .toc{
  display:none;
}
body.focus .layout{
  display:block;
  max-width:1100px;
  padding:10px;
}

@media(max-width:850px){
  .layout{
    display:block;
    padding:10px;
  }
  .toc{
    position:relative;
    top:0;
    max-height:220px;
    margin-bottom:10px;
  }
  .toc.closed{
    display:none;
  }
  .card{
    border-radius:18px;
    padding:16px;
  }
  table{
    min-width:680px;
  }
  .brand h1{
    font-size:26px;
  }
}

@media(max-height:520px) and (orientation:landscape){
  .topbar{
    position:relative!important;
    padding:8px 12px;
  }
  .toc{
    display:none;
  }
  .layout{
    display:block;
    padding:8px 12px 26px;
  }
  .card{
    padding:18px 22px;
    border-radius:16px;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="top-inner">
    <div class="brand">
      <h1>BTVN</h1>
      <div class="actions">
        <button onclick="toggleToc()">Mục lục</button>
        <button onclick="toggleFocus()">Focus</button>
      </div>
    </div>

    <nav class="nav">
      <button data-file="index.md" onclick="go('index.md')">Trang chủ</button>
      <button data-file="anh.md" onclick="go('anh.md')">Tiếng Anh</button>
      <button data-file="toan.md" onclick="go('toan.md')">Toán</button>
      <button data-file="van.md" onclick="go('van.md')">Văn</button>
    </nav>

    <div class="search">
      <input id="searchBox" placeholder="Tìm nhanh trong bài..." oninput="searchText(this.value)">
    </div>
  </div>
</header>

<div class="layout">
  <aside class="toc" id="toc">
    <h2>Mục lục</h2>
    <div id="tocList">Đang tải...</div>
  </aside>

  <main>
    <article class="card" id="content">
      <div class="loading">Đang tải...</div>
    </article>
  </main>
</div>

<div class="float">
  <button onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  <button onclick="saveNow()">Lưu chỗ</button>
</div>

<script>
marked.setOptions({ breaks:true, gfm:true });

let currentFile = "index.md";
let rawHTML = "";
let saveTimer = null;
let restored = false;

function slugify(text){
  return text
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^\w\s-]/g,"")
    .trim()
    .replace(/\s+/g,"-");
}

function go(file){
  currentFile = file;
  localStorage.setItem("btvn_file", file);
  location.hash = file;
}

function setActive(file){
  document.querySelectorAll(".nav button").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.file === file);
  });
}

function toggleToc(){
  document.getElementById("toc").classList.toggle("closed");
}

function toggleFocus(){
  document.body.classList.toggle("focus");
  localStorage.setItem("btvn_focus", document.body.classList.contains("focus") ? "1" : "0");
}

function wrapTables(){
  document.querySelectorAll("#content table").forEach(table=>{
    const rows = [...table.querySelectorAll("tr")];
    let max = 0;

    rows.forEach(row => max = Math.max(max, row.children.length));

    rows.forEach(row=>{
      while(row.children.length < max){
        const td = document.createElement("td");
        td.innerHTML = "";
        row.appendChild(td);
      }
    });

    if(!table.parentElement.classList.contains("table-wrap")){
      const wrap = document.createElement("div");
      wrap.className = "table-wrap";
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    }
  });
}

function buildToc(){
  const toc = document.getElementById("tocList");
  const headings = document.querySelectorAll("#content h1, #content h2, #content h3");

  if(!headings.length){
    toc.innerHTML = "<span style='color:#777'>Không có mục lục</span>";
    return;
  }

  toc.innerHTML = "";

  headings.forEach((h, i)=>{
    const id = slugify(h.textContent) || "heading-" + i;
    h.id = id;

    const a = document.createElement("a");
    a.href = "#" + id;
    a.textContent = h.textContent;
    a.style.paddingLeft = h.tagName === "H3" ? "18px" : h.tagName === "H2" ? "8px" : "0";
    toc.appendChild(a);
  });
}

function highlightCode(){
  document.querySelectorAll("pre code").forEach(block=>{
    hljs.highlightElement(block);
  });
}

function saveProgress(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    localStorage.setItem("btvn_file", currentFile);
    localStorage.setItem("btvn_scroll_" + currentFile, String(window.scrollY));
  },120);
}

function saveNow(){
  localStorage.setItem("btvn_file", currentFile);
  localStorage.setItem("btvn_scroll_" + currentFile, String(window.scrollY));
  alert("Đã lưu chỗ đang đọc.");
}

function restoreScroll(file){
  const y = Number(localStorage.getItem("btvn_scroll_" + file) || 0);
  if(y > 0){
    setTimeout(()=>window.scrollTo(0,y),300);
  }else{
    window.scrollTo(0,0);
  }
}

function searchText(q){
  const content = document.getElementById("content");

  if(!rawHTML) return;

  if(!q.trim()){
    content.innerHTML = rawHTML;
    wrapTables();
    buildToc();
    highlightCode();
    return;
  }

  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const reg = new RegExp(safe, "gi");

  content.innerHTML = rawHTML.replace(reg, match => `<mark>${match}</mark>`);
  wrapTables();
  buildToc();
}

function loadMD(file){
  currentFile = file;
  setActive(file);

  const el = document.getElementById("content");
  el.innerHTML = "<div class='loading'>Đang tải...</div>";
  document.getElementById("tocList").innerHTML = "Đang tải...";

  fetch(file)
    .then(res=>{
      if(!res.ok) throw new Error("Không thấy file");
      return res.text();
    })
    .then(md=>{
      rawHTML = marked.parse(md);
      el.innerHTML = rawHTML;

      wrapTables();
      buildToc();
      highlightCode();

      localStorage.setItem("btvn_file", file);
      restoreScroll(file);
    })
    .catch(()=>{
      rawHTML = "";
      el.innerHTML = `
        <h1>Không load được file</h1>
        <p>Chưa tìm thấy file: <code>${file}</code></p>
        <p>Hãy kiểm tra tên file trong GitHub repo.</p>
      `;
      document.getElementById("tocList").innerHTML = "Không có";
    });
}

function router(){
  let file = decodeURIComponent(location.hash.replace("#",""));
  if(!file){
    file = localStorage.getItem("btvn_file") || "index.md";
    location.hash = file;
    return;
  }
  loadMD(file);
}

window.addEventListener("scroll", saveProgress);
window.addEventListener("beforeunload", saveProgress);
window.addEventListener("hashchange", router);

if(localStorage.getItem("btvn_focus")==="1"){
  document.body.classList.add("focus");
}

router();
</script>

</body>
</html>
