<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTVN</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
  background:#050505;
  color:#f2f2f2;
  line-height:1.7;
}

/* layout */
.layout{
  display:flex;
  min-height:100vh;
}

/* sidebar */
.sidebar{
  width:260px;
  min-width:260px;
  padding:20px;
  background:#0a0a0a;
  border-right:1px solid rgba(255,255,255,.08);
  position:sticky;
  top:0;
  height:100vh;
}

.logo h1{
  margin:0;
  font-size:26px;
}

.logo p{
  margin:5px 0 15px;
  font-size:13px;
  color:#888;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.nav button{
  padding:12px;
  border:none;
  border-radius:12px;
  background:#111;
  color:#ddd;
  text-align:left;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.08);
}

.nav button.active{
  background:#222;
  color:#fff;
}

/* content */
.content{
  flex:1;
  padding:30px;
  display:flex;
  justify-content:center;
}

.card{
  width:100%;
  max-width:900px;
  padding:30px;
  background:#0f0f0f;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
}

/* text */
h1{font-size:40px;margin-top:0}
h2{margin-top:30px}

/* TABLE FIX */
.table-wrap{
  overflow-x:auto;
  margin:20px 0;
}

table{
  width:100%;
  min-width:600px;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.08);
  vertical-align:top;
}

/* chia đều 2 cột */
th:nth-child(1), td:nth-child(1){width:50%}
th:nth-child(2), td:nth-child(2){width:50%}

td{
  word-break:break-word;
}

tr:hover td{
  background:rgba(255,255,255,.04);
}

/* code */
pre{
  overflow:auto;
  background:#000;
  padding:14px;
  border-radius:10px;
}

code{
  background:#222;
  padding:2px 6px;
  border-radius:5px;
}

/* mobile */
@media(max-width:800px){
  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    padding:10px;
  }

  .nav{
    flex-direction:row;
    overflow-x:auto;
  }

  .nav button{
    white-space:nowrap;
  }

  .content{
    padding:10px;
  }

  .card{
    padding:18px;
  }

  h1{
    font-size:30px;
  }
}
</style>
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">
      <h1>BTVN</h1>
      <p>Kho Markdown</p>
    </div>

    <nav class="nav">
      <button onclick="go('index.md')" data-file="index.md">Trang chủ</button>
      <button onclick="go('anh.md')" data-file="anh.md">Tiếng Anh</button>
      <button onclick="go('toan.md')" data-file="toan.md">Toán</button>
      <button onclick="go('van.md')" data-file="van.md">Văn</button>
    </nav>
  </aside>

  <main class="content">
    <div class="card" id="content">Đang tải...</div>
  </main>

</div>

<script>
function setActive(file){
  document.querySelectorAll(".nav button").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.file===file)
  })
}

function wrapTables(){
  document.querySelectorAll("table").forEach(table=>{
    if(!table.parentElement.classList.contains("table-wrap")){
      const wrap=document.createElement("div")
      wrap.className="table-wrap"
      table.parentNode.insertBefore(wrap,table)
      wrap.appendChild(table)
    }
  })
}

function loadMD(file){
  const el=document.getElementById("content")
  el.innerHTML="Đang tải..."
  setActive(file)

  fetch(file)
    .then(r=>r.text())
    .then(md=>{
      el.innerHTML=marked.parse(md)
      wrapTables()

      document.querySelectorAll("pre code").forEach(b=>{
        hljs.highlightElement(b)
      })
    })
    .catch(()=>{
      el.innerHTML="❌ Không load được file"
    })
}

function go(file){
  location.hash=file
}

function router(){
  let f=location.hash.replace("#","")
  if(!f)f="index.md"
  loadMD(f)
}

window.addEventListener("hashchange",router)
router()
</script>

</body>
</html>
