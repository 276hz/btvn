<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>nhathuyydepxhaii =))</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#030303;
  color:#eee;
  line-height:1.65;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 0%,rgba(255,255,255,.08),transparent 30%),
    radial-gradient(circle at 85% 12%,rgba(255,255,255,.04),transparent 34%),
    linear-gradient(180deg,#070707,#020202);
}

.topbar{
  position:relative;
  z-index:20;
  padding:14px 14px 10px;
  background:rgba(5,5,5,.9);
  border-bottom:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
}
.top-inner{max-width:1320px;margin:0 auto}
.brand{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand h1{margin:0;font-size:30px;color:#fff;letter-spacing:.3px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
button{
  border:1px solid rgba(255,255,255,.12);
  background:rgba(20,20,20,.9);
  color:#eee;
  border-radius:999px;
  padding:9px 13px;
  cursor:pointer;
  font-size:14px;
}
button:hover{background:#242424}
.nav{display:flex;gap:8px;overflow-x:auto;padding:12px 0 4px}
.nav button{flex:0 0 auto;white-space:nowrap}
.nav button.active{
  background:rgba(255,255,255,.16);
  border-color:rgba(255,255,255,.34);
  color:#fff;
}
.search input{
  width:100%;
  margin-top:10px;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.1);
  background:#0d0d0d;
  color:#fff;
  outline:none;
}

.layout{
  display:grid;
  grid-template-columns:270px minmax(0,1fr);
  gap:18px;
  max-width:1320px;
  margin:0 auto;
  padding:18px;
}
.toc{
  position:sticky;
  top:12px;
  align-self:start;
  max-height:calc(100vh - 24px);
  overflow:auto;
  padding:16px;
  background:rgba(12,12,12,.78);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
}
.toc h2{margin:0 0 12px;font-size:16px}
.toc a{
  display:block;
  padding:8px 0;
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.toc a:hover{color:#fff}
.card{
  min-width:0;
  padding:clamp(17px,3vw,42px);
  background:rgba(12,12,12,.78);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  box-shadow:0 30px 100px rgba(0,0,0,.62);
}
.loading{
  min-height:220px;
  display:grid;
  place-items:center;
  color:#fff;
  font-size:30px;
  font-weight:900;
  letter-spacing:.5px;
}

.card h1{margin:0 0 24px;font-size:clamp(32px,5vw,52px);line-height:1.1;color:#fff}
.card h2{
  margin-top:38px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,.08);
  font-size:clamp(23px,3.5vw,34px);
  color:#fff;
}
.card h3{margin-top:28px;font-size:clamp(19px,3vw,26px);color:#f1f1f1}
.card p,.card li{font-size:16px;color:#ddd}
.card strong{color:#fff}
.card a{color:#fff;text-decoration:none;border-bottom:1px dashed rgba(255,255,255,.35)}
.card blockquote{
  margin:22px 0;
  padding:14px 18px;
  border-left:4px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.045);
  border-radius:14px;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  margin:22px 0;
  border:1px solid rgba(255,255,255,.09);
  border-radius:16px;
  background:rgba(0,0,0,.25);
}
table{width:100%;border-collapse:collapse;table-layout:auto}
th,td{
  padding:13px 15px;
  border-bottom:1px solid rgba(255,255,255,.08);
  vertical-align:top;
  white-space:normal;
  word-break:normal;
  overflow-wrap:break-word;
  line-height:1.6;
}
th{background:rgba(255,255,255,.08);color:#fff;font-weight:800}
td{background:rgba(10,10,10,.45);color:#e8e8e8}
tr:hover td{background:rgba(255,255,255,.045)}

table.table-2{min-width:680px}
table.table-2 th:nth-child(1),table.table-2 td:nth-child(1){width:50%;font-weight:750}
table.table-2 th:nth-child(2),table.table-2 td:nth-child(2){width:50%}

table.table-3{min-width:900px}
table.table-3 th:nth-child(1),table.table-3 td:nth-child(1){
  width:70px;min-width:70px;max-width:90px;text-align:center;white-space:nowrap;
}
table.table-3 th:nth-child(2),table.table-3 td:nth-child(2){
  width:90px;min-width:90px;max-width:120px;text-align:center;white-space:nowrap;font-weight:800;
}
table.table-3 th:nth-child(3),table.table-3 td:nth-child(3){
  min-width:520px;width:auto;text-align:left;overflow-wrap:normal;word-break:normal;
}

table.table-4{min-width:980px}
table.table-4 th:nth-child(1),table.table-4 td:nth-child(1){
  width:70px;min-width:70px;text-align:center;white-space:nowrap;
}
table.table-4 th:nth-child(2),table.table-4 td:nth-child(2){min-width:260px;font-weight:750}
table.table-4 th:nth-child(3),table.table-4 td:nth-child(3){min-width:300px}
table.table-4 th:nth-child(4),table.table-4 td:nth-child(4){min-width:160px}

pre{
  overflow:auto;
  padding:16px;
  border-radius:16px;
  background:#050505;
  border:1px solid rgba(255,255,255,.09);
}
code{background:rgba(255,255,255,.08);padding:3px 7px;border-radius:7px}
pre code{background:transparent;padding:0}
mark{background:#fff;color:#000;border-radius:4px;padding:0 2px}

.float{
  position:fixed;
  right:14px;
  bottom:14px;
  display:flex;
  gap:8px;
  z-index:50;
}
.float button{background:rgba(20,20,20,.85);backdrop-filter:blur(14px)}

body.focus .topbar,body.focus .toc{display:none}
body.focus .layout{display:block;max-width:1180px;padding:10px}

.error-era{
  min-height:340px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  gap:12px;
}
.error-era h1{
  margin:0;
  font-size:clamp(42px,8vw,88px);
  letter-spacing:-2px;
}
.error-era p{margin:0;color:#aaa;font-size:18px}

@media(max-width:850px){
  .layout{display:block;padding:10px}
  .toc{position:relative;top:0;max-height:230px;margin-bottom:10px}
  .toc.closed{display:none}
  .card{border-radius:18px;padding:16px}
  .brand h1{font-size:26px}
  .card h1{font-size:31px}
  .card p,.card li{font-size:15.5px}
  table.table-2{min-width:640px}
  table.table-3{min-width:860px}
  table.table-4{min-width:940px}
  th,td{padding:12px 13px}
  .float{right:10px;bottom:10px}
}

@media(max-height:520px) and (orientation:landscape){
  .topbar{position:relative!important;padding:8px 12px}
  .toc{display:none}
  .layout{display:block;padding:8px 12px 26px}
  .card{padding:18px 22px;border-radius:16px}
}
</style>
</head>

<body>

<header class="topbar">
  <div class="top-inner">
    <div class="brand">
      <h1>Tieng anh</h1>
      <div class="actions">
        <button onclick="toggleToc()">Mục lục</button>
        <button onclick="toggleFocus()">Focus</button>
      </div>
    </div>

    <nav class="nav">
      <button data-file="index.md" onclick="go('index.md')">Trang chủ</button>
      <button data-file="anh.md" onclick="go('anh.md')">Tiếng Anh</button>
      <button data-file="toan.md" onclick="go('toan.md')">Toán</button>
      <button data-file="van.md" onclick="go('van.md')">Văn</button>
    </nav>

    <div class="search">
      <input id="searchBox" placeholder="hmm..." oninput="searchText(this.value)">
    </div>
  </div>
</header>

<div class="layout">
  <aside class="toc" id="toc">
    <h2>404</h2>
    <div id="tocList">404</div>
  </aside>

  <main>
    <article class="card" id="content">
      <div class="loading">404</div>
    </article>
  </main>
</div>

<div class="float">
  <button onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  <button onclick="saveNow()">Lưu chỗ</button>
</div>

<script>
marked.setOptions({ breaks:true, gfm:true });

let currentFile = "index.md";
let rawHTML = "";
let saveTimer = null;

function slugify(text){
  return text
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^\w\s-]/g,"")
    .trim()
    .replace(/\s+/g,"-");
}

function go(file){
  currentFile = file;
  localStorage.setItem("btvn_file", file);
  location.hash = file;
}

function setActive(file){
  document.querySelectorAll(".nav button").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.file === file);
  });
}

function toggleToc(){
  document.getElementById("toc").classList.toggle("closed");
}

function toggleFocus(){
  document.body.classList.toggle("focus");
  localStorage.setItem("btvn_focus", document.body.classList.contains("focus") ? "1" : "0");
}

function normalizeTables(){
  document.querySelectorAll("#content table").forEach(table=>{
    const rows=[...table.querySelectorAll("tr")];
    let max=0;

    rows.forEach(row=>{
      max=Math.max(max,row.children.length);
    });

    rows.forEach(row=>{
      while(row.children.length<max){
        const td=document.createElement("td");
        td.innerHTML="";
        row.appendChild(td);
      }
    });

    table.classList.remove("table-2","table-3","table-4");

    if(max===2) table.classList.add("table-2");
    else if(max===3) table.classList.add("table-3");
    else if(max===4) table.classList.add("table-4");

    if(!table.parentElement.classList.contains("table-wrap")){
      const wrap=document.createElement("div");
      wrap.className="table-wrap";
      table.parentNode.insertBefore(wrap,table);
      wrap.appendChild(table);
    }
  });
}

function buildToc(){
  const toc=document.getElementById("tocList");
  const headings=document.querySelectorAll("#content h1,#content h2,#content h3");

  if(!headings.length){
    toc.innerHTML="<span style='color:#777'>404</span>";
    return;
  }

  toc.innerHTML="";

  headings.forEach((h,i)=>{
    const id=slugify(h.textContent) || "heading-"+i;
    h.id=id;

    const a=document.createElement("a");
    a.href="#"+id;
    a.textContent=h.textContent;
    a.style.paddingLeft=h.tagName==="H3" ? "18px" : h.tagName==="H2" ? "8px" : "0";
    toc.appendChild(a);
  });
}

function highlightCode(){
  document.querySelectorAll("pre code").forEach(block=>{
    hljs.highlightElement(block);
  });
}

function saveProgress(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    localStorage.setItem("btvn_file",currentFile);
    localStorage.setItem("btvn_scroll_"+currentFile,String(window.scrollY));
  },120);
}

function saveNow(){
  localStorage.setItem("btvn_file",currentFile);
  localStorage.setItem("btvn_scroll_"+currentFile,String(window.scrollY));
  alert("404");
}

function restoreScroll(file){
  const y=Number(localStorage.getItem("btvn_scroll_"+file) || 0);
  setTimeout(()=>{
    window.scrollTo(0,y || 0);
  },300);
}

function searchText(q){
  const content=document.getElementById("content");
  if(!rawHTML) return;

  if(!q.trim()){
    content.innerHTML=rawHTML;
    normalizeTables();
    buildToc();
    highlightCode();
    return;
  }

  const safe=q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const reg=new RegExp(safe,"gi");

  content.innerHTML=rawHTML.replace(reg,match=>`<mark>${match}</mark>`);
  normalizeTables();
  buildToc();
}

function loadMD(file){
  currentFile=file;
  setActive(file);

  const el=document.getElementById("content");
  el.innerHTML="<div class='loading'>404</div>";
  document.getElementById("tocList").innerHTML="404";

  fetch(file)
    .then(res=>{
      if(!res.ok) throw new Error("404");
      return res.text();
    })
    .then(md=>{
      rawHTML=marked.parse(md);
      el.innerHTML=rawHTML;

      normalizeTables();
      buildToc();
      highlightCode();

      localStorage.setItem("btvn_file",file);
      restoreScroll(file);
    })
    .catch(()=>{
      rawHTML="";
      el.innerHTML=`
        <div class="error-era">
          <h1>404</h1>
          <p>404</p>
        </div>
      `;
      document.getElementById("tocList").innerHTML="404";
    });
}
function router(){
  let file = decodeURIComponent(location.hash.replace("#",""));
  if(!file){
    file = localStorage.getItem("btvn_file") || "index.md";
    location.hash = file;
    return;
  }
  loadMD(file);
}

window.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("btvn_focus") === "1") {
    document.body.classList.add("focus");
  }

  router();



window.addEventListener("scroll", saveProgress);
window.addEventListener("beforeunload", saveProgress);
window.addEventListener("hashchange", router);

</script>

</body>
</html>
