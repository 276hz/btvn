<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BTVN</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 35%),
    radial-gradient(circle at top right, rgba(168,85,247,.16), transparent 35%),
    linear-gradient(135deg, #020617, #0f172a);
  color: #e5e7eb;
  line-height: 1.75;
  overflow-x: hidden;
}

.layout {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR DESKTOP */
.sidebar {
  width: 280px;
  min-width: 280px;
  height: 100vh;
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 22px;
  background: rgba(2, 6, 23, .88);
  border-right: 1px solid rgba(148,163,184,.18);
  backdrop-filter: blur(18px);
  overflow-y: auto;
}

.logo {
  margin-bottom: 22px;
}

.logo h1 {
  margin: 0;
  font-size: 25px;
  letter-spacing: .5px;
  color: #fff;
}

.logo p {
  margin: 6px 0 0;
  font-size: 13px;
  color: #94a3b8;
}

.nav-title {
  margin: 22px 0 10px;
  font-size: 12px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.nav button {
  width: 100%;
  border: 1px solid rgba(148,163,184,.18);
  border-radius: 14px;
  padding: 12px 13px;
  background: rgba(15,23,42,.85);
  color: #e5e7eb;
  font-size: 15px;
  text-align: left;
  cursor: pointer;
  transition: .2s ease;
}

.nav button:hover {
  background: rgba(30,41,59,.95);
  border-color: rgba(96,165,250,.6);
  transform: translateX(4px);
}

.nav button.active {
  background: linear-gradient(135deg, rgba(59,130,246,.28), rgba(168,85,247,.24));
  border-color: rgba(96,165,250,.8);
  color: #fff;
}

/* CONTENT */
.content {
  flex: 1;
  width: calc(100% - 280px);
  padding: clamp(18px, 4vw, 48px);
  display: flex;
  justify-content: center;
}

.card {
  width: min(100%, 1000px);
  min-height: calc(100vh - 96px);
  padding: clamp(22px, 4vw, 42px);
  background: rgba(15, 23, 42, .72);
  border: 1px solid rgba(148,163,184,.18);
  border-radius: 26px;
  box-shadow: 0 24px 90px rgba(0,0,0,.42);
  backdrop-filter: blur(18px);
  animation: fadeUp .35s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(14px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.loading {
  min-height: 220px;
  display: grid;
  place-items: center;
  color: #94a3b8;
}

/* MARKDOWN STYLE */
.card h1 {
  margin-top: 0;
  font-size: clamp(28px, 5vw, 46px);
  line-height: 1.15;
  color: #fff;
}

.card h2 {
  margin-top: 42px;
  padding-top: 18px;
  border-top: 1px solid rgba(148,163,184,.16);
  font-size: clamp(23px, 3.5vw, 32px);
  color: #f8fafc;
}

.card h3 {
  margin-top: 30px;
  font-size: clamp(19px, 3vw, 24px);
  color: #f1f5f9;
}

.card p,
.card li {
  font-size: clamp(16px, 2.3vw, 18px);
}

.card a {
  color: #60a5fa;
  text-decoration: none;
  border-bottom: 1px dashed rgba(96,165,250,.5);
}

.card a:hover {
  color: #93c5fd;
}

.card blockquote {
  margin: 22px 0;
  padding: 14px 18px;
  border-left: 4px solid #60a5fa;
  background: rgba(59,130,246,.1);
  border-radius: 12px;
  color: #cbd5e1;
}

/* TABLE */
.table-wrap {
  width: 100%;
  overflow-x: auto;
  margin: 20px 0;
  border: 1px solid rgba(148,163,184,.18);
  border-radius: 16px;
}

table {
  width: 100%;
  min-width: 620px;
  border-collapse: collapse;
}

th, td {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(148,163,184,.16);
  border-right: 1px solid rgba(148,163,184,.12);
  vertical-align: top;
}

th {
  background: rgba(30,41,59,.9);
  color: #fff;
  font-weight: 700;
}

td {
  background: rgba(15,23,42,.42);
}

tr:hover td {
  background: rgba(30,41,59,.55);
}

/* CODE */
pre {
  max-width: 100%;
  overflow-x: auto;
  padding: 18px;
  border-radius: 16px;
  background: #020617;
  border: 1px solid rgba(148,163,184,.15);
}

pre code {
  background: transparent;
  padding: 0;
  border-radius: 0;
}

code {
  background: rgba(30,41,59,.95);
  color: #e2e8f0;
  padding: 3px 7px;
  border-radius: 7px;
}

/* IMAGES */
img {
  max-width: 100%;
  border-radius: 16px;
}

/* MOBILE */
@media (max-width: 820px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    min-width: 0;
    height: auto;
    max-height: 40vh;
    position: sticky;
    top: 0;
    border-right: none;
    border-bottom: 1px solid rgba(148,163,184,.18);
    padding: 14px;
  }

  .logo {
    margin-bottom: 12px;
  }

  .logo h1 {
    font-size: 21px;
  }

  .logo p {
    font-size: 12px;
  }

  .nav-title {
    display: none;
  }

  .nav {
    flex-direction: row;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 4px;
  }

  .nav button {
    width: auto;
    min-width: max-content;
    padding: 10px 13px;
    font-size: 14px;
    white-space: nowrap;
  }

  .nav button:hover {
    transform: none;
  }

  .content {
    width: 100%;
    padding: 14px;
  }

  .card {
    min-height: auto;
    border-radius: 20px;
    padding: 20px;
  }

  table {
    min-width: 560px;
  }
}

/* SMALL MOBILE */
@media (max-width: 430px) {
  body {
    line-height: 1.65;
  }

  .sidebar {
    max-height: 34vh;
  }

  .card {
    padding: 17px;
    border-radius: 18px;
  }

  th, td {
    padding: 10px;
  }

  table {
    min-width: 520px;
  }
}
</style>
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">
      <h1>BTVN</h1>
      <p>Kho bài tập Markdown</p>
    </div>

    <div class="nav-title">Danh sách</div>

    <nav class="nav">
      <button data-file="index.md" onclick="go('index.md')">🏠 Trang chủ</button>
      <button data-file="anh.md" onclick="go('anh.md')">🇬🇧 Tiếng Anh</button>
      <button data-file="toan.md" onclick="go('toan.md')">➗ Toán</button>
      <button data-file="van.md" onclick="go('van.md')">📖 Văn</button>
      <button data-file="sinh.md" onclick="go('sinh.md')">🧬 Sinh</button>
      <button data-file="ly.md" onclick="go('ly.md')">⚡ Lý</button>
      <button data-file="hoa.md" onclick="go('hoa.md')">🧪 Hóa</button>
    </nav>
  </aside>

  <main class="content">
    <article class="card" id="content">
      <div class="loading">Đang tải Markdown...</div>
    </article>
  </main>

</div>

<script>
marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

function setActive(file) {
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.file === file);
  });
}

function wrapTables() {
  document.querySelectorAll("#content table").forEach(table => {
    if (!table.parentElement.classList.contains("table-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "table-wrap";
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    }
  });
}

function loadMD(file) {
  const el = document.getElementById("content");
  setActive(file);

  el.innerHTML = "<div class='loading'>Đang tải Markdown...</div>";

  fetch(file)
    .then(res => {
      if (!res.ok) throw new Error("Không tìm thấy file");
      return res.text();
    })
    .then(md => {
      el.innerHTML = marked.parse(md);
      wrapTables();

      document.querySelectorAll("pre code").forEach(block => {
        hljs.highlightElement(block);
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    })
    .catch(() => {
      el.innerHTML = `
        <h1>Không load được file</h1>
        <p>Không tìm thấy hoặc chưa tạo file: <code>${file}</code></p>
        <p>Hãy tạo file này trong repo GitHub rồi thử lại.</p>
      `;
    });
}

function go(file) {
  location.hash = file;
}

function router() {
  let file = decodeURIComponent(location.hash.replace("#", ""));
  if (!file) file = "index.md";
  loadMD(file);
}

window.addEventListener("hashchange", router);
router();
</script>

</body>
</html>
