<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BTVN</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(80, 80, 80, .18), transparent 34%),
    radial-gradient(circle at 90% 10%, rgba(40, 40, 40, .22), transparent 36%),
    linear-gradient(180deg, #050505 0%, #090909 45%, #030303 100%);
  color: #e7e7e7;
  line-height: 1.72;
  overflow-x: hidden;
}

/* Layout */
.layout {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 280px;
  min-width: 280px;
  height: 100vh;
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 24px;
  background: rgba(5, 5, 5, .82);
  border-right: 1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(22px);
  overflow-y: auto;
}

.logo {
  margin-bottom: 22px;
}

.logo h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: .8px;
  color: #fff;
}

.logo p {
  margin: 6px 0 0;
  font-size: 13px;
  color: #8b8b8b;
}

.nav-title {
  margin: 24px 0 10px;
  font-size: 11px;
  color: #6f6f6f;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.nav button {
  flex: 0 0 auto;
  width: 100%;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 15px;
  padding: 12px 14px;
  background: rgba(18,18,18,.78);
  color: #dcdcdc;
  font-size: 15px;
  text-align: left;
  cursor: pointer;
  transition: .22s ease;
}

.nav button:hover {
  background: rgba(32,32,32,.9);
  border-color: rgba(255,255,255,.18);
  transform: translateX(4px);
}

.nav button.active {
  background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.05));
  border-color: rgba(255,255,255,.3);
  color: #fff;
  box-shadow: 0 0 28px rgba(255,255,255,.06);
}

/* Content */
.content {
  flex: 1;
  width: calc(100% - 280px);
  padding: clamp(16px, 4vw, 48px);
  display: flex;
  justify-content: center;
}

.card {
  width: min(100%, 1040px);
  min-height: calc(100vh - 96px);
  padding: clamp(20px, 4vw, 44px);
  background: rgba(12,12,12,.76);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 28px;
  box-shadow:
    0 30px 100px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.04);
  backdrop-filter: blur(20px);
  animation: fadeUp .35s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(14px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.loading {
  min-height: 220px;
  display: grid;
  place-items: center;
  color: #8b8b8b;
}

/* Markdown */
.card h1 {
  margin-top: 0;
  font-size: clamp(30px, 6vw, 52px);
  line-height: 1.08;
  color: #fff;
  letter-spacing: -.8px;
}

.card h2 {
  margin-top: 42px;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: clamp(23px, 4vw, 34px);
  color: #f5f5f5;
}

.card h3 {
  margin-top: 30px;
  font-size: clamp(19px, 3vw, 25px);
  color: #eeeeee;
}

.card p,
.card li {
  font-size: clamp(15.5px, 2.2vw, 18px);
  color: #d5d5d5;
}

.card strong {
  color: #fff;
}

.card a {
  color: #f3f3f3;
  text-decoration: none;
  border-bottom: 1px dashed rgba(255,255,255,.35);
}

.card a:hover {
  color: #fff;
  border-color: rgba(255,255,255,.75);
}

.card blockquote {
  margin: 22px 0;
  padding: 15px 18px;
  border-left: 4px solid rgba(255,255,255,.35);
  background: rgba(255,255,255,.045);
  border-radius: 14px;
  color: #cfcfcf;
}

/* Table */
.table-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 22px 0;
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 18px;
  background: rgba(5,5,5,.4);
}

table {
  width: 100%;
  min-width: 700px;
  border-collapse: collapse;
}

th, td {
  min-width: 160px;
  padding: 13px 15px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  border-right: 1px solid rgba(255,255,255,.06);
  vertical-align: top;
}

th {
  background: rgba(255,255,255,.075);
  color: #fff;
  font-weight: 750;
}

td {
  background: rgba(10,10,10,.42);
  color: #e1e1e1;
}

tr:hover td {
  background: rgba(255,255,255,.045);
}

/* Code */
pre {
  max-width: 100%;
  overflow-x: auto;
  padding: 18px;
  border-radius: 18px;
  background: #050505;
  border: 1px solid rgba(255,255,255,.09);
}

pre code {
  background: transparent;
  padding: 0;
}

code {
  background: rgba(255,255,255,.08);
  color: #fff;
  padding: 3px 7px;
  border-radius: 7px;
}

/* Image */
img {
  max-width: 100%;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.08);
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: #050505;
}

::-webkit-scrollbar-thumb {
  background: #2b2b2b;
  border-radius: 999px;
}

::-webkit-scrollbar-thumb:hover {
  background: #444;
}

/* Mobile */
@media (max-width: 820px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    min-width: 0;
    height: auto;
    max-height: 132px;
    position: sticky;
    top: 0;
    padding: 14px 16px;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,.08);
    overflow: hidden;
  }

  .logo {
    margin-bottom: 11px;
  }

  .logo h1 {
    font-size: 24px;
  }

  .logo p {
    font-size: 12px;
  }

  .nav-title {
    display: none;
  }

  .nav {
    flex-direction: row;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 7px;
  }

  .nav button {
    width: auto;
    min-width: max-content;
    padding: 10px 14px;
    font-size: 14px;
    white-space: nowrap;
    border-radius: 999px;
  }

  .nav button:hover {
    transform: none;
  }

  .content {
    width: 100%;
    padding: 14px;
  }

  .card {
    width: 100%;
    min-height: auto;
    border-radius: 22px;
    padding: 20px;
  }

  table {
    min-width: 680px;
  }
}

/* Small mobile */
@media (max-width: 430px) {
  body {
    line-height: 1.65;
  }

  .sidebar {
    max-height: 124px;
  }

  .card {
    padding: 17px;
    border-radius: 20px;
  }

  .card h1 {
    font-size: 30px;
  }

  .card p,
  .card li {
    font-size: 15.5px;
  }

  th, td {
    min-width: 155px;
    padding: 11px 12px;
  }

  table {
    min-width: 660px;
  }
}
</style>
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <div class="logo">
      <h1>BTVN</h1>
      <p>Kho bài tập Markdown</p>
    </div>

    <div class="nav-title">Danh sách</div>

    <nav class="nav">
      <button data-file="index.md" onclick="go('index.md')">🏠 Trang chủ</button>
      <button data-file="anh.md" onclick="go('anh.md')">🇬🇧 Tiếng Anh</button>
      <button data-file="toan.md" onclick="go('toan.md')">➗ Toán</button>
      <button data-file="van.md" onclick="go('van.md')">📖 Văn</button>
      <button data-file="sinh.md" onclick="go('sinh.md')">🧬 Sinh</button>
      <button data-file="ly.md" onclick="go('ly.md')">⚡ Lý</button>
      <button data-file="hoa.md" onclick="go('hoa.md')">🧪 Hóa</button>
    </nav>
  </aside>

  <main class="content">
    <article class="card" id="content">
      <div class="loading">Đang tải Markdown...</div>
    </article>
  </main>

</div>

<script>
marked.setOptions({
  breaks: true,
  gfm: true
});

function setActive(file) {
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.file === file);
  });
}

function wrapTables() {
  document.querySelectorAll("#content table").forEach(table => {
    if (!table.parentElement.classList.contains("table-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "table-wrap";
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    }
  });
}

function highlightCode() {
  document.querySelectorAll("pre code").forEach(block => {
    hljs.highlightElement(block);
  });
}

function loadMD(file) {
  const el = document.getElementById("content");
  setActive(file);

  el.innerHTML = "<div class='loading'>Đang tải Markdown...</div>";

  fetch(file)
    .then(res => {
      if (!res.ok) throw new Error();
      return res.text();
    })
    .then(md => {
      el.innerHTML = marked.parse(md);
      wrapTables();
      highlightCode();
      window.scrollTo({ top: 0, behavior: "smooth" });
    })
    .catch(() => {
      el.innerHTML = `
        <h1>Không load được file</h1>
        <p>Chưa tìm thấy file: <code>${file}</code></p>
        <p>Hãy tạo file này trong repo GitHub rồi thử lại.</p>
      `;
    });
}

function go(file) {
  location.hash = file;
}

function router() {
  let file = decodeURIComponent(location.hash.replace("#", ""));
  if (!file) file = "index.md";
  loadMD(file);
}

window.addEventListener("hashchange", router);
router();
</script>

</body>
</html>
